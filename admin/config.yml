# Decap CMS configuration for the Pivot Path Insights / blog section.
#
# LOCAL TESTING (now): `local_backend: true` lets you edit fully offline with no auth
# and no GitHub account — run `npx decap-server` in one terminal, open /admin/ in a
# browser, and edits write straight to insights/*.md in your working tree.
#
# PRODUCTION (AWS): the `backend` block below takes over, and the /admin/ route is
# gated by Microsoft Entra ID SSO at the CloudFront edge (Lambda@Edge OIDC). The exact
# commit path (git-gateway/bot vs GitHub App) is finalised at the AWS cut-over so that
# marketers never need individual GitHub accounts.

backend:
  name: github
  repo: hiti-sf/pivotpath-website-concept
  branch: lean

# Offline local editing — remove or set false once real auth is wired at AWS.
local_backend: true

# Uploaded images land here (served as-is under /assets/insights on the static site).
media_folder: "assets/insights"
public_folder: "assets/insights"

# Show the human title (not the filename) in the entry list.
site_url: https://pivotpath.com
display_url: https://pivotpath.com

collections:
  - name: insights
    label: "Insights & Blog"
    label_singular: "Insight"
    description: >
      Blog articles, use cases and news. After saving, run
      `python3 tooling/build_insights.py` to publish to HTML.
      Stats must trace to docs/CAPABILITIES.md — never invent numbers.
    folder: "insights"
    create: true
    slug: "{{fields.slug}}"
    extension: md
    format: yaml-frontmatter
    summary: "{{title}}  ·  {{category}}  ·  {{status}}"
    sortable_fields: [date, title]
    fields:
      - { name: title, label: "Title (page H1)", widget: string }
      - name: slug
        label: "Slug"
        hint: "URL becomes pivotpath-insight-<slug>.html — lowercase, hyphens only."
        widget: string
        pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', "Use lowercase letters, numbers and hyphens only"]
      - { name: date, label: "Date", widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - name: category
        label: "Category (drives the Insights filter tab)"
        widget: select
        default: "blog"
        options:
          - { label: "Blog", value: "blog" }
          - { label: "Use Case", value: "use-case" }
          - { label: "News", value: "news" }
          - { label: "Case Study", value: "case-study" }
      - name: service_line
        label: "Service line (optional — shown in the card tag)"
        widget: select
        required: false
        default: ""
        options:
          - { label: "— none —", value: "" }
          - { label: "Patient Safety", value: "patient-safety" }
          - { label: "Digital Transformation", value: "digital-transformation" }
          - { label: "Human Capital", value: "human-capital" }
          - { label: "IP & Clinical", value: "ip-clinical" }
          - { label: "Quality & Compliance", value: "quality-compliance" }
      - name: status
        label: "Status"
        hint: "Only 'published' posts are rendered by the build (drafts stay hidden)."
        widget: select
        default: "draft"
        options:
          - { label: "Draft", value: "draft" }
          - { label: "Published", value: "published" }
      - { name: excerpt, label: "Excerpt / card summary", widget: text, hint: "1–2 sentences — used on the Insights card and hero." }
      - { name: meta_title, label: "SEO meta title", widget: string, required: false, hint: "≤60 chars, ends with '| Pivot Path'. Falls back to Title." }
      - { name: meta_description, label: "SEO meta description", widget: text, required: false, hint: "≤155 chars, active, contains the primary keyword once." }
      - { name: hero_image, label: "Hero image (optional)", widget: image, required: false }
      - { name: body, label: "Body", widget: markdown, hint: "Start with a hook paragraph; use H2/H3 for sections. No second H1." }
